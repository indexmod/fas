<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A N G R Y by Andr-o-Dei</title>

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='black'/%3E%3Ccircle cx='35' cy='35' r='5' fill='white'/%3E%3Ccircle cx='65' cy='35' r='5' fill='white'/%3E%3Ccircle cx='50' cy='65' r='5' fill='white'/%3E%3C/svg%3E" type="image/svg+xml">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    height:100%;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.circle{
    position:absolute;
    width:400px;
    height:400px;
    background:#fff;
    border-radius:50%;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
}

.overlay-lines{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:10;
    display:flex;
    flex-direction:column;
    align-items:center;
    pointer-events:none;
}

.top-lines{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:100px;
}

.line{
    width:200px;
    height:20px;
    background:#000;
    transform-origin:center;
    transition:transform .3s ease-out;
}

.gap{
    width:50px;
    height:20px;
}
</style>

</head>

<body>

<div id="circle" class="circle"></div>

<div class="overlay-lines">

    <div class="top-lines">

        <div id="lineLeft" class="line"></div>

        <div class="gap"></div>

        <div id="lineRight" class="line"></div>

    </div>

    <div id="lineBottom" class="line"></div>

</div>

<script>

const circle=document.getElementById("circle");

const lineLeft=document.getElementById("lineLeft");
const lineRight=document.getElementById("lineRight");
const lineBottom=document.getElementById("lineBottom");

const movementRange=150;
const parallaxFactor=0.5;

function moveCircle(){

    const offsetX=(Math.random()-0.5)*2*movementRange;
    const offsetY=(Math.random()-0.5)*2*movementRange;

    const mode=Math.floor(Math.random()*3);

    let x=0;
    let y=0;

    if(mode===0){

        x=offsetX;

    }else if(mode===1){

        y=offsetY;

    }else{

        x=offsetX;
        y=offsetY;

    }

    circle.style.transition="transform .3s ease-out";

    circle.style.transform=
        `translate(calc(-50% + ${x}px), calc(-50% + ${y}px))`;

    const lx=-x*parallaxFactor;
    const ly=-y*parallaxFactor;

    const t=`translate(${lx}px,${ly}px)`;

    lineLeft.style.transform=t;
    lineRight.style.transform=t;
    lineBottom.style.transform=t;

}

moveCircle();

setInterval(moveCircle,500+Math.random()*1500);

</script>

</body>
</html>
