<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Маски + звук</title>

<style>
body{
    background:#000;
    margin:0;
    padding:10px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
    grid-auto-rows:auto;
    gap:10px;
    justify-items:center;
    align-items:center;
}

img{
    display:block;
}
</style>

</head>

<body>

<script>

const faceSize=100;
const maxMasks=300;

let audioCtx=null;
let started=false;

// ---------- Звук ----------

function playRandomTone(){

    if(!audioCtx) return;

    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();

    osc.frequency.value=200+Math.random()*1000;
    osc.type="sine";

    gain.gain.setValueAtTime(
        0.2,
        audioCtx.currentTime
    );

    gain.gain.exponentialRampToValueAtTime(
        0.001,
        audioCtx.currentTime+0.3
    );

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime+0.3);

}

// ---------- Маска ----------

function createMask(size){

    const faceR=42;

    const eyeBaseY=38+Math.random()*6;
    const eyeBaseX=35+Math.random()*4;
    const eyeGap=28+Math.random()*6;

    const eyeR=Math.random()*12;

    const mouthY=62+Math.random()*6;
    const mouthR=4+Math.random()*16;

    return `
<svg xmlns="http://www.w3.org/2000/svg"
width="${size}"
height="${size}"
viewBox="0 0 100 100">

<rect width="100" height="100" fill="#000"/>

<circle cx="50" cy="50" r="${faceR}" fill="#fff"/>

<circle
cx="${eyeBaseX}"
cy="${eyeBaseY}"
r="${eyeR.toFixed(2)}"
fill="#000"/>

<circle
cx="${eyeBaseX+eyeGap}"
cy="${eyeBaseY}"
r="${eyeR.toFixed(2)}"
fill="#000"/>

<circle
cx="50"
cy="${mouthY}"
r="${mouthR.toFixed(2)}"
fill="#000"/>

</svg>`;

}

function svgToPng(svg,size,callback){

    const img=new Image();

    const blob=new Blob(
        [svg],
        {type:"image/svg+xml;charset=utf-8"}
    );

    const url=URL.createObjectURL(blob);

    img.onload=()=>{

        const canvas=document.createElement("canvas");

        canvas.width=size;
        canvas.height=size;

        const ctx=canvas.getContext("2d");

        ctx.fillStyle="#000";
        ctx.fillRect(0,0,size,size);

        ctx.drawImage(img,0,0,size,size);

        callback(canvas.toDataURL("image/png"));

        URL.revokeObjectURL(url);

    };

    img.src=url;

}

function addMask(){

    const svg=createMask(faceSize);

    svgToPng(svg,faceSize,(png)=>{

        const img=document.createElement("img");

        img.src=png;
        img.width=faceSize;
        img.height=faceSize;

        if(document.body.firstChild){

            document.body.insertBefore(
                img,
                document.body.firstChild
            );

        }else{

            document.body.appendChild(img);

        }

        if(document.body.childElementCount>maxMasks){

            document.body.removeChild(
                document.body.lastChild
            );

        }

    });

}

// ---------- Автозапуск ----------

async function startArtwork(){

    if(started) return;

    started=true;

    if(!audioCtx){

        audioCtx=new(
            window.AudioContext||
            window.webkitAudioContext
        )();

        try{

            await audioCtx.resume();

        }catch(e){}

    }

    setInterval(()=>{

        addMask();
        playRandomTone();

    },500);

}

window.addEventListener("message",(e)=>{

    if(e.data==="START"){

        startArtwork();

    }

});

</script>

</body>
</html>
