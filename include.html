<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Floating Faces Drone</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: #000;
  overflow: hidden;
}
canvas {
  display: block;
}

/* подсказка */
#hint {
  position: fixed;
  right: 18px;
  bottom: 18px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.6);
  color: rgba(255,255,255,0.75);
  font-family: system-ui, sans-serif;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  transition: opacity 0.6s ease;
}
#hint.hidden {
  opacity: 0;
}
</style>
</head>

<body>
<canvas id="c"></canvas>
<div id="hint">кликни</div>

<script>
(() => {
  /* ================= CANVAS ================= */
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width = innerWidth;
    H = canvas.height = innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  /* ================= AUDIO ================= */
  let audioCtx = null;
  let droneOsc = null;
  let droneGain = null;
  let soundEnabled = false;

  function unlockAudio() {
    if (audioCtx) return;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    audioCtx.resume();

    // дрон
    droneOsc = audioCtx.createOscillator();
    droneGain = audioCtx.createGain();

    droneOsc.type = 'sine';
    droneOsc.frequency.value = 55; // низкий фундамент
    droneGain.gain.value = 0.0;

    droneOsc.connect(droneGain);
    droneGain.connect(audioCtx.destination);
    droneOsc.start();

    // медленно поднимаем громкость
    const t = audioCtx.currentTime;
    droneGain.gain.linearRampToValueAtTime(0.035, t + 3);

    soundEnabled = true;
  }

  function playBell(freq) {
    if (!soundEnabled) return;

    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = 'sine';
    osc.frequency.value = freq;

    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.15, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 1.2);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(t);
    osc.stop(t + 1.3);
  }

  /* ================= FACE ================= */
  function randomFace() {
    return {
      eyeGap: 16 + Math.random() * 10,
      eyeY: -6 + Math.random() * 4,
      eyeR: 3 + Math.random() * 4,
      mouthR: 4 + Math.random() * 6
    };
  }

  function drawFace(x, y, r, face, wobble) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(wobble);

    // лицо
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();

    ctx.fillStyle = '#000';

    // глаза
    ctx.beginPath();
    ctx.arc(-face.eyeGap / 2, face.eyeY, face.eyeR, 0, Math.PI * 2);
    ctx.arc(face.eyeGap / 2, face.eyeY, face.eyeR, 0, Math.PI * 2);
    ctx.fill();

    // рот — только кружок
    ctx.beginPath();
    ctx.arc(0, 10, face.mouthR, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  /* ================= PHYSICS ================= */
  class Face {
    constructor(x, y) {
      this.r = 22 + Math.random() * 18;
      this.x = x;
      this.y = y;

      const speed = 20 + Math.random() * 60;
      const a = Math.random() * Math.PI * 2;
      this.vx = Math.cos(a) * speed;
      this.vy = Math.sin(a) * speed;

      this.face = randomFace();
      this.wobble = Math.random() * Math.PI * 2;
    }

    step(dt) {
      this.x += this.vx * dt;
      this.y += this.vy * dt;
      this.wobble += dt * 0.6;

      let hit = false;

      if (this.x - this.r < 0) {
        this.x = this.r;
        this.vx = Math.abs(this.vx);
        hit = true;
      }
      if (this.x + this.r > W) {
        this.x = W - this.r;
        this.vx = -Math.abs(this.vx);
        hit = true;
      }
      if (this.y - this.r < 0) {
        this.y = this.r;
        this.vy = Math.abs(this.vy);
        hit = true;
      }
      if (this.y + this.r > H) {
        this.y = H - this.r;
        this.vy = -Math.abs(this.vy);
        hit = true;
      }

      if (hit) {
        playBell(180 + this.r * 6 + Math.random() * 120);
      }
    }

    draw() {
      drawFace(
        this.x,
        this.y,
        this.r,
        this.face,
        Math.sin(this.wobble) * 0.12
      );
    }
  }

  const faces = [];

  function collide(a, b) {
    const dx = b.x - a.x;
    const dy = b.y - a.y;
    const dist = Math.hypot(dx, dy);
    const min = a.r + b.r;

    if (dist < min && dist > 0) {
      const nx = dx / dist;
      const ny = dy / dist;
      const overlap = (min - dist) / 2;

      a.x -= nx * overlap;
      a.y -= ny * overlap;
      b.x += nx * overlap;
      b.y += ny * overlap;

      const rvx = b.vx - a.vx;
      const rvy = b.vy - a.vy;
      const rel = rvx * nx + rvy * ny;

      if (rel < 0) {
        playBell(220 + Math.random() * 240);
        a.vx += nx * rel * 0.5;
        a.vy += ny * rel * 0.5;
        b.vx -= nx * rel * 0.5;
        b.vy -= ny * rel * 0.5;
      }
    }
  }

  /* ================= LOOP ================= */
  let last = performance.now();
  function loop(t) {
    const dt = (t - last) / 1000;
    last = t;

    ctx.clearRect(0, 0, W, H);

    for (const f of faces) f.step(dt);

    for (let i = 0; i < faces.length; i++) {
      for (let j = i + 1; j < faces.length; j++) {
        collide(faces[i], faces[j]);
      }
    }

    for (const f of faces) f.draw();

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  /* ================= INIT ================= */
  const initialCount = 6 + Math.floor(Math.random() * 2);
  for (let i = 0; i < initialCount; i++) {
    faces.push(
      new Face(
        Math.random() * W,
        Math.random() * H
      )
    );
  }

  /* ================= INPUT ================= */
  canvas.addEventListener('pointerdown', (e) => {
    unlockAudio();
    faces.push(new Face(e.clientX, e.clientY));
    document.getElementById('hint').classList.add('hidden');
  });

})();
</script>
</body>
</html>
