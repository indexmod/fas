<style>
html,body{
margin:0;
padding:0;
background:white;
font-family:Helvetica, Arial, sans-serif;
height:100%;
}

#startScreen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:white;
z-index:10;
transition:opacity 1.5s;
}

#playButton{
width:120px;
height:120px;
border-radius:60px;
background:black;
cursor:pointer;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);opacity:1}
50%{transform:scale(1.08);opacity:.8}
100%{transform:scale(1);opacity:1}
}

.wrapper{
width:90vw;
max-width:900px;
margin:auto;
padding-top:8vh;
opacity:0;
transition:opacity 3s;
}

video{
width:100%;
background:black;
aspect-ratio:16/9;
}

.bottomRow{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-top:25px;
}

.caption{
font-size:18px;
line-height:1.5;
}

.next{
width:70px;
height:70px;
border-radius:35px;
background:black;
animation:pulse 2.4s infinite;
}

.next a{
display:block;
width:100%;
height:100%;
}
</style>

</head>

<body>

<div id="startScreen">
<div id="playButton"></div>
</div>

<div class="wrapper" id="content">

<video id="videoPlayer" playsinline></video>
<audio id="audioPlayer"></audio>

<div class="bottomRow">

<div class="caption">
Работа (без названия, не окончена) из серии «24 Хор».<br>
Материал — фанера, чёрный и красный маркер.<br>
Размеры: 120 × 60.<br>
Автор Андр-о-Дей.<br>
2026, март.
</div>

<div class="next">
<a href="https://fas.indexmod.xyz/"></a>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const video=document.getElementById('videoPlayer')
const audio=document.getElementById('audioPlayer')
const playButton=document.getElementById('playButton')
const startScreen=document.getElementById('startScreen')
const content=document.getElementById('content')

const VIDEO_HLS="https://pub-581ad16b881c4c508b223afe7425cecd.r2.dev/video.m3u8"
const AUDIO_HLS="/audio/audio.m3u8"

let hlsVideo
let hlsAudio

function initVideo(){

if(hlsVideo){
hlsVideo.destroy()
}

hlsVideo=new Hls({
autoStartLoad:true,
maxBufferLength:20
})

hlsVideo.loadSource(VIDEO_HLS)
hlsVideo.attachMedia(video)

hlsVideo.on(Hls.Events.MANIFEST_PARSED,()=>{

video.play()

video.addEventListener("timeupdate",handleRandomMontage)

})

hlsVideo.on(Hls.Events.ERROR,(event,data)=>{

if(data.fatal){

if(data.type===Hls.ErrorTypes.NETWORK_ERROR){
hlsVideo.startLoad()
}else{
initVideo()
}

}

})

video.loop=true

}

function handleRandomMontage(){

if(!video.duration || isNaN(video.duration)) return

if(video.currentTime > video.duration - 1){
randomJump()
}

}

function randomJump(){

if(!video.duration) return

const windowSize=8
const maxStart=Math.max(video.duration-windowSize,0)
const randomTime=Math.random()*maxStart

video.currentTime=randomTime

}

function initAudio(){

if(hlsAudio){
hlsAudio.destroy()
}

hlsAudio=new Hls()

hlsAudio.loadSource(AUDIO_HLS)
hlsAudio.attachMedia(audio)

hlsAudio.on(Hls.Events.MANIFEST_PARSED,()=>{
audio.play()
})

audio.loop=true

}

playButton.onclick=()=>{

startScreen.style.opacity=0

setTimeout(()=>{
startScreen.style.display="none"
content.style.opacity=1
},1200)

if(Hls.isSupported()){
initVideo()
initAudio()
}else{
video.src=VIDEO_HLS
audio.src=AUDIO_HLS
video.play()
audio.play()
}

}

</script>

</body>
</html>
