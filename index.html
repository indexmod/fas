<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<meta property="og:type" content="website">
<meta property="og:title" content="Андрей Дей — Фас">
<meta property="og:description" content="Однодневная выставка графики, скульптуры, инсталляции и видео 15 июля 2026, Москва.">
<meta property="og:image" content="preview.png">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Андрей Дей — Фас</title>

<style>
:root {
  --bg:#000;
  --fg:#fff;
  --border:1px solid #fff;
}

* { box-sizing:border-box; }

body {
  margin:0;
  background:var(--bg);
  color:var(--fg);
  font-family: system-ui, -apple-system, "sf pro text", helvetica, arial, sans-serif;
}

.poster {
  min-height:100vh;
  display:grid;
  grid-template-rows:auto auto auto auto 1fr;
}

.cell {
  border-bottom:var(--border);
  padding:24px 40px;
  display:flex;
  align-items:center;
}

.top {
  display:grid;
  grid-template-columns:1fr 1fr;
}

.top .cell {
  border-right:var(--border);
  justify-content:center;
  font-size:22px;
  letter-spacing:.12em;
}

.top .cell:last-child { border-right:none; }

.author {
  font-size:clamp(36px,5vw,72px);
}

.title-row {
  display:grid;
  grid-template-columns:auto 1fr;
  min-height:30vh;
}

.title {
  justify-content:center;
  font-size:clamp(72px,12vw,180px);
  letter-spacing:.15em;
  border-right:var(--border);
}

.interactive {
  position:relative;
  border-bottom:var(--border);
  overflow:hidden;
}

canvas {
  display:block;
}

.button-wrap {
  position:absolute;
  bottom:20px;
  right:20px;
}

button {
  background:#fff;
  color:#000;
  border:none;
  padding:12px 22px;
  font-size:18px;
  cursor:pointer;
}

.desc {
  font-size:22px;
  line-height:1.6;
  display:grid;
  grid-template-columns:auto 1fr;
  gap:40px;
}

.bottom {
  justify-content:center;
}

a {
  color:var(--fg);
  text-decoration:none;
}

a:hover { text-decoration:underline; }

@media (max-width:900px) {
  .top { grid-template-columns:1fr; }
  .title-row { grid-template-columns:1fr; }
  .title { border-right:none; border-bottom:var(--border); }
}
</style>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='8' fill='white'/></svg>">
</head>

<body>

<div class="poster">

  <div class="top">
    <div class="cell">Москва · 15 июля 2026</div>
    <div class="cell">Однодневная выставка</div>
  </div>

  <div class="cell author">Андрей Дей</div>

  <div class="title-row">
    <div class="cell title">Фас</div>

    <div class="interactive">
      <canvas id="faces"></canvas>
      <div class="button-wrap">
        <button id="click">Кликни</button>
      </div>
    </div>
  </div>

  <div class="cell desc">
    <div>
      графика<br>
      скульптура<br>
      инсталляция<br>
      видео
    </div>
    <div></div>
  </div>

  <div class="cell bottom">
    <a href="https://t.me/fas_dei" target="_blank">
      Анонсы и приглашения в телеграме
    </a>
  </div>

</div>

<script>
const canvas = document.getElementById('faces');
const ctx = canvas.getContext('2d');

let faces = [];
let audioCtx;
let drone, pad;

function resize() {
  canvas.width = canvas.parentElement.clientWidth;
  canvas.height = canvas.parentElement.clientHeight;
  normalizeFaces();
}
window.addEventListener('resize', resize);
resize();

function maxFaces() {
  return Math.max(1, Math.floor((canvas.width * canvas.height) / 50000));
}

function normalizeFaces() {
  faces = faces.slice(0, maxFaces());
}

function addFace() {
  if (faces.length >= maxFaces()) normalizeFaces();

  const r = 12 + Math.random() * 18;
  faces.push({
    x: Math.random() * (canvas.width - 2 * r) + r,
    y: Math.random() * (canvas.height - 2 * r) + r,
    vx: (Math.random() - 0.5) * 1.6,
    vy: (Math.random() - 0.5) * 1.6,
    r,
    cooldown: 0
  });
}

function drawFace(f) {
  // head
  ctx.beginPath();
  ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
  ctx.stroke();

  // eyes
  const eyeOffset = f.r * 0.35;
  const eyeR = Math.max(1.5, f.r * 0.08);

  ctx.beginPath();
  ctx.arc(f.x - eyeOffset, f.y - eyeOffset * 0.3, eyeR, 0, Math.PI * 2);
  ctx.arc(f.x + eyeOffset, f.y - eyeOffset * 0.3, eyeR, 0, Math.PI * 2);
  ctx.fill();

  // mouth
  ctx.beginPath();
  ctx.arc(f.x, f.y + f.r * 0.25, f.r * 0.25, 0, Math.PI);
  ctx.stroke();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.strokeStyle = '#fff';
  ctx.fillStyle = '#fff';

  faces.forEach(f => {
    f.x += f.vx;
    f.y += f.vy;

    let hit = false;

    if (f.x < f.r || f.x > canvas.width - f.r) {
      f.vx *= -1;
      hit = true;
    }
    if (f.y < f.r || f.y > canvas.height - f.r) {
      f.vy *= -1;
      hit = true;
    }

    if (hit && f.cooldown <= 0) {
      edgeSound(f.r);
      f.cooldown = 20;
    }

    if (f.cooldown > 0) f.cooldown--;

    drawFace(f);
  });

  requestAnimationFrame(draw);
}
draw();

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  drone = audioCtx.createOscillator();
  const droneGain = audioCtx.createGain();
  drone.type = 'sine';
  drone.frequency.value = 55;
  droneGain.gain.value = 0.04;
  drone.connect(droneGain).connect(audioCtx.destination);
  drone.start();

  pad = audioCtx.createOscillator();
  const padGain = audioCtx.createGain();
  pad.type = 'triangle';
  pad.frequency.value = 220;
  padGain.gain.value = 0.025;
  pad.connect(padGain).connect(audioCtx.destination);
  pad.start();
}

function edgeSound(size) {
  if (!audioCtx) return;

  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();

  o.type = 'sine';
  o.frequency.value = 180 + size * 8;

  g.gain.setValueAtTime(0, audioCtx.currentTime);
  g.gain.linearRampToValueAtTime(0.03, audioCtx.currentTime + 0.02);
  g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.18);

  o.connect(g).connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + 0.2);
}

document.getElementById('click').addEventListener('click', () => {
  if (!audioCtx) initAudio();
  addFace();
});
</script>

</body>
</html>
