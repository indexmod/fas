<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<meta property="og:type" content="website">
<meta property="og:title" content="Андрей Дей — Фас">
<meta property="og:description" content="Однодневная выставка графики, скульптуры, инсталляции и видео 15 июля 2026, Москва.">
<meta property="og:image" content="preview.png">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Андрей Дей — Фас</title>

<style>
:root {
  --bg:#000;
  --fg:#fff;
  --border:1px solid #fff;
}

* { box-sizing:border-box; }

body {
  margin:0;
  background:var(--bg);
  color:var(--fg);
  font-family: system-ui, -apple-system, "sf pro text", helvetica, arial, sans-serif;
}

.poster {
  min-height:100vh;
  display:grid;
  grid-template-rows:auto auto auto auto 1fr;
}

.cell {
  border-bottom:var(--border);
  padding:24px 40px;
  display:flex;
  align-items:center;
}

.top {
  display:grid;
  grid-template-columns:1fr 1fr;
}

.top .cell {
  border-right:var(--border);
  justify-content:center;
  font-size:22px;
  letter-spacing:.12em;
}

.top .cell:last-child { border-right:none; }

.author {
  font-size:clamp(36px,5vw,72px);
}

.title-row {
  display:grid;
  grid-template-columns:auto 1fr;
  min-height:30vh;
}

.title {
  justify-content:center;
  font-size:clamp(72px,12vw,180px);
  letter-spacing:.15em;
  border-right:var(--border);
}

.interactive {
  position:relative;
  border-bottom:var(--border);
  overflow:hidden;
}

canvas {
  display:block;
}

.button-wrap {
  position:absolute;
  bottom:20px;
  right:20px;
}

button {
  background:#fff;
  color:#000;
  border:none;
  padding:12px 22px;
  font-size:18px;
  cursor:pointer;
}

.desc {
  font-size:22px;
  line-height:1.6;
  display:grid;
  grid-template-columns:auto 1fr;
  gap:40px;
}

.bottom {
  justify-content:center;
}

a {
  color:var(--fg);
  text-decoration:none;
}

a:hover { text-decoration:underline; }

@media (max-width:900px) {
  .top { grid-template-columns:1fr; }
  .title-row { grid-template-columns:1fr; }
  .title { border-right:none; border-bottom:var(--border); }
}
</style>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='8' fill='white'/></svg>">
</head>

<body>

<div class="poster">

  <div class="top">
    <div class="cell">Москва · 15 июля 2026</div>
    <div class="cell">Однодневная выставка</div>
  </div>

  <div class="cell author">Андрей Дей</div>

  <div class="title-row">
    <div class="cell title">Фас</div>

    <div class="interactive">
      <canvas id="faces"></canvas>
      <div class="button-wrap">
        <button id="click">Кликни</button>
      </div>
    </div>
  </div>

  <div class="cell desc">
    <div>
      графика<br>
      скульптура<br>
      инсталляция<br>
      видео
    </div>
    <div></div>
  </div>

  <div class="cell bottom">
    <a href="https://t.me/fas_dei" target="_blank">
      Анонсы и приглашения в телеграме
    </a>
  </div>

</div>

<script>
(() => {
  const canvas = document.getElementById('faces');
  const ctx = canvas.getContext('2d');

  let W, H;
  function resize() {
    W = canvas.width = canvas.parentElement.clientWidth;
    H = canvas.height = canvas.parentElement.clientHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  /* ============= AUDIO ============= */
  let audioCtx = null;

  function unlockAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioCtx.resume();
    }
  }

  function playBell(freq) {
    if (!audioCtx) return;
    const t = audioCtx.currentTime;

    const carrier = audioCtx.createOscillator();
    const mod = audioCtx.createOscillator();
    const modGain = audioCtx.createGain();
    const gain = audioCtx.createGain();

    carrier.type = 'sine';
    mod.type = 'sine';

    carrier.frequency.value = freq;
    mod.frequency.value = freq * (1.5 + Math.random() * 2);
    modGain.gain.value = freq * 0.4;

    gain.gain.setValueAtTime(0.0001, t);
    gain.gain.exponentialRampToValueAtTime(0.3, t + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 1.2);

    mod.connect(modGain);
    modGain.connect(carrier.frequency);
    carrier.connect(gain);
    gain.connect(audioCtx.destination);

    carrier.start(t);
    mod.start(t);
    carrier.stop(t + 1.4);
    mod.stop(t + 1.4);
  }

  /* ============= FACE ============= */
  function randomFace() {
    return {
      eyeGap: 16 + Math.random() * 10,
      eyeY: -6 + Math.random() * 4,
      eyeR: 3 + Math.random() * 4,
      mouthType: Math.floor(Math.random() * 3),
      mouthR: 4 + Math.random() * 6
    };
  }

  function drawFace(x, y, r, face, wobble) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(wobble);

    // head
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();

    ctx.fillStyle = '#000';

    // eyes
    ctx.beginPath();
    ctx.arc(-face.eyeGap / 2, face.eyeY, face.eyeR, 0, Math.PI * 2);
    ctx.arc(face.eyeGap / 2, face.eyeY, face.eyeR, 0, Math.PI * 2);
    ctx.fill();

    // mouth
    if (face.mouthType === 0) {
      ctx.beginPath();
      ctx.arc(0, 10, face.mouthR, 0, Math.PI * 2);
      ctx.fill();
    } else if (face.mouthType === 1) {
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, 12, face.mouthR + 3, 0, Math.PI);
      ctx.stroke();
    } else {
      ctx.fillRect(-face.mouthR, 10, face.mouthR * 2, 2);
    }

    ctx.restore();
  }

  /* ============= PHYSICS ============= */
  class Face {
    constructor(x, y) {
      this.r = 22 + Math.random() * 18;
      this.x = x;
      this.y = y;
      const speed = 20 + Math.random() * 60;
      const a = Math.random() * Math.PI * 2;
      this.vx = Math.cos(a) * speed;
      this.vy = Math.sin(a) * speed;
      this.face = randomFace();
      this.wobblePhase = Math.random() * Math.PI * 2;
    }

    step(dt) {
      this.x += this.vx * dt;
      this.y += this.vy * dt;
      this.wobblePhase += dt * 0.6;

      let hit = false;

      if (this.x - this.r < 0) {
        this.x = this.r;
        this.vx = Math.abs(this.vx);
        hit = true;
      }
      if (this.x + this.r > W) {
        this.x = W - this.r;
        this.vx = -Math.abs(this.vx);
        hit = true;
      }
      if (this.y - this.r < 0) {
        this.y = this.r;
        this.vy = Math.abs(this.vy);
        hit = true;
      }
      if (this.y + this.r > H) {
        this.y = H - this.r;
        this.vy = -Math.abs(this.vy);
        hit = true;
      }

      if (hit) playBell(180 + this.r * 6 + Math.random() * 120);
    }

    draw() {
      drawFace(this.x, this.y, this.r, this.face, Math.sin(this.wobblePhase) * 0.12);
    }
  }

  const faces = [];

  function maxFaces() {
    return Math.floor((canvas.width * canvas.height) / 40000);
  }

  function normalizeFaces() {
    if (faces.length > maxFaces()) {
      faces.splice(maxFaces());
    }
  }

  /* ============= LOOP ============= */
  let last = performance.now();
  function loop(t) {
    const dt = (t - last) / 1000;
    last = t;

    ctx.clearRect(0, 0, W, H);

    for (const f of faces) f.step(dt);
    for (const f of faces) f.draw();

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  /* ============= INPUT ============= */
  function addFace(x, y) {
    if (faces.length >= maxFaces()) normalizeFaces();
    faces.push(new Face(x, y));
  }

  document.getElementById('click').addEventListener('click', e => {
    unlockAudio();
    addFace(canvas.width/2, canvas.height/2);
  });

  canvas.addEventListener('pointerdown', e => {
    unlockAudio();
    addFace(e.offsetX, e.offsetY);
  });
})();
</script>


</body>
</html>
