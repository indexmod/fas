<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>FAS</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial,sans-serif;
}

iframe{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    border:0;
    display:none;
    background:#000;
}

#overlay{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    z-index:1000;
}

#start{
    width:140px;
    height:140px;
    border-radius:50%;
    border:2px solid #fff;
    cursor:pointer;
    animation:pulse 2s infinite;
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:14px;
    letter-spacing:.15em;
    user-select:none;
}

@keyframes pulse{
    0%{
        transform:scale(1);
        opacity:.7;
    }
    50%{
        transform:scale(1.15);
        opacity:1;
    }
    100%{
        transform:scale(1);
        opacity:.7;
    }
}
</style>
</head>

<body>

<div id="overlay">
    <div id="start">ENTER</div>
</div>

<iframe id="frame"></iframe>

<script>

const API="https://api.github.com/repos/indexmod/fas/contents";
const BASE="https://fas.indexmod.press/";

const frame=document.getElementById("frame");

let pages=[];
let index=0;

async function loadPlaylist(){

    const r=await fetch(API);
    const files=await r.json();

    pages=files
        .filter(f=>f.type==="file")
        .filter(f=>f.name.endsWith(".html"))
        .filter(f=>f.name!=="index.html")
        .map(f=>BASE+encodeURIComponent(f.name));

    pages.sort(()=>Math.random()-0.5);
}

function next(){

    frame.src=pages[index]+"?t="+Date.now();

    index=(index+1)%pages.length;
}

document.getElementById("start").addEventListener("click",async()=>{

    // Разблокируем звук
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    await ctx.resume();

    // Короткий бесшумный сигнал
    const osc=ctx.createOscillator();
    const gain=ctx.createGain();

    gain.gain.value=0;

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();
    osc.stop(ctx.currentTime+0.05);

    await loadPlaylist();

    document.getElementById("overlay").remove();

    frame.style.display="block";

    next();

    frame.onload=()=>{
        frame.contentWindow.postMessage("START","*");
    };

    setInterval(next,10000);

});

</script>

</body>
</html>
