<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FAS — live stream</title>

<meta name="description" content="Looping audio and video live stream. Independent signal.">

<link rel="canonical" href="https://fas.indexmod.xyz/">

<meta property="og:type" content="website">
<meta property="og:title" content="FAS — looping live stream">
<meta property="og:description" content="Independent looping audio and video stream.">
<meta property="og:url" content="https://fas.indexmod.xyz/">
<meta property="og:image" content="https://fas.indexmod.xyz/preview.png">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="FAS — looping live stream">
<meta name="twitter:description" content="Independent looping audio and video stream.">
<meta name="twitter:image" content="https://fas.indexmod.xyz/preview.png">

<meta name="theme-color" content="#ffffff">

<link rel="icon" type="image/svg+xml"
href='data:image/svg+xml,
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<circle cx="50" cy="50" r="45" fill="white"/>
</svg>'>

<link rel="preload" href="/audio/audio.m3u8" as="fetch" crossorigin>

<style>
html,body{
margin:0;
padding:0;
background:white;
font-family:Helvetica, Arial, sans-serif;
height:100%;
}

#startScreen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:white;
z-index:10;
transition:opacity 1.5s;
}

#playButton{
width:120px;
height:120px;
border-radius:60px;
background:black;
cursor:pointer;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);opacity:1}
50%{transform:scale(1.08);opacity:.8}
100%{transform:scale(1);opacity:1}
}

.wrapper{
width:90vw;
max-width:900px;
margin:auto;
padding-top:8vh;
opacity:0;
transition:opacity 3s;
}

video{
width:100%;
background:black;
aspect-ratio:16/9;
}

.bottomRow{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-top:25px;
}

.caption{
font-size:18px;
line-height:1.5;
}

.next{
width:70px;
height:70px;
border-radius:35px;
background:black;
animation:pulse 2.4s infinite;
}

.next a{
display:block;
width:100%;
height:100%;
}
</style>

</head>

<body>

<div id="startScreen">
<div id="playButton"></div>
</div>

<div class="wrapper" id="content">

<video id="videoPlayer" playsinline></video>
<audio id="audioPlayer"></audio>

<div class="bottomRow">

<div class="caption">
LIVE STREAM<br>
LOOPING AUDIO<br>
INDEPENDENT SIGNAL<br>
INDEXMOD
</div>

<div class="next">
<a href="https://fas.indexmod.xyz/"></a>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const video=document.getElementById('videoPlayer')
const audio=document.getElementById('audioPlayer')
const playButton=document.getElementById('playButton')
const startScreen=document.getElementById('startScreen')
const content=document.getElementById('content')

const VIDEO_HLS="https://pub-581ad16b881c4c508b223afe7425cecd.r2.dev/video/video.m3u8"
const AUDIO_HLS="/audio/audio.m3u8"

playButton.onclick=()=>{

startScreen.style.opacity=0

setTimeout(()=>{
startScreen.style.display="none"
content.style.opacity=1
},1200)

if(Hls.isSupported()){

const hlsVideo=new Hls()
hlsVideo.loadSource(VIDEO_HLS)
hlsVideo.attachMedia(video)
hlsVideo.on(Hls.Events.MANIFEST_PARSED,()=>video.play())

const hlsAudio=new Hls()
hlsAudio.loadSource(AUDIO_HLS)
hlsAudio.attachMedia(audio)
hlsAudio.on(Hls.Events.MANIFEST_PARSED,()=>audio.play())

}else{

video.src=VIDEO_HLS
audio.src=AUDIO_HLS
video.play()
audio.play()

}

audio.loop=true

}

</script>

</body>
</html>
