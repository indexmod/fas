<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FAS — live stream</title>

<link rel="icon" type="image/svg+xml"
href='data:image/svg+xml,
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<rect width="100" height="100" fill="white"/>
<circle cx="50" cy="50" r="40" fill="black"/>
</svg>'>

<style>

html,body{
margin:0;
padding:0;
background:white;
font-family:Helvetica, Arial, sans-serif;
display:flex;
justify-content:center;
}

/* MAIN LAYOUT */

.page{
width:43vw;
max-width:900px;
margin-top:8vh;
}

/* VIDEO */

video{
width:100%;
aspect-ratio:16/9;
background:black;
display:block;
}

/* BOTTOM ROW */

.bottomRow{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-top:12px;
}

/* TEXT MODULE */

.credits{
font-size:12px;
line-height:1.35;
max-width:75%;
}

/* BLACK BUTTON WITH PULSE */

.linkButton{
width:70px;
height:70px;
border-radius:50%;
background:black;
display:block;
flex-shrink:0;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.1)}
100%{transform:scale(1)}
}

/* START SCREEN */

#startScreen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:white;
z-index:10;
transition:opacity 1s;
}

#playButton{
width:120px;
height:120px;
border-radius:60px;
background:black;
cursor:pointer;
animation:pulse 2s infinite;
}

/* RESPONSIVE */

@media (max-width:900px){

.page{
width:70vw;
}

}

@media (max-width:600px){

.page{
width:90vw;
}

.credits{
font-size:11px;
max-width:70%;
}

.linkButton{
width:60px;
height:60px;
}

}

</style>
</head>

<body>

<div id="startScreen">
<div id="playButton"></div>
</div>

<div class="page">

<video id="videoPlayer" playsinline autoplay loop></video>

<div class="bottomRow">

<div class="credits">
Работа (без названия, не окончена) из серии «24 Хор». Материал — фанера, чёрный и красный маркер. 120×60. Андр-о-Дей. 2026, март. Музыка: Molchat Doma — “Sudno (Boris Ryzhy)”.
</div>

<a href="https://fas.indexmod.xyz/" class="linkButton"></a>

</div>

</div>

<audio id="audioPlayer" loop></audio>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const video=document.getElementById("videoPlayer")
const audio=document.getElementById("audioPlayer")
const startScreen=document.getElementById("startScreen")
const playButton=document.getElementById("playButton")

const VIDEO_SRC="/video/video.m3u8"
const AUDIO_SRC="/audio/audio.m3u8"

function initVideo(){

if(Hls.isSupported()){
const hlsVideo=new Hls()
hlsVideo.loadSource(VIDEO_SRC)
hlsVideo.attachMedia(video)
}else{
video.src=VIDEO_SRC
}

video.loop=true
video.play()

}

function initAudio(){

if(Hls.isSupported()){
const hlsAudio=new Hls()
hlsAudio.loadSource(AUDIO_SRC)
hlsAudio.attachMedia(audio)
}else{
audio.src=AUDIO_SRC
}

audio.loop=true
audio.play()

}

playButton.onclick=()=>{

startScreen.style.opacity=0

setTimeout(()=>{
startScreen.style.display="none"
},1000)

initVideo()
initAudio()

}

</script>

</body>
</html>
