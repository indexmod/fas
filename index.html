<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>FAS Player</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}
iframe{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    border:0;
}
</style>
</head>
<body>

<iframe id="frame"></iframe>

<script>
const API="https://api.github.com/repos/indexmod/fas/contents";
const BASE="https://fas.indexmod.press/";

let pages=[];
let i=0;

async function init(){

    const r=await fetch(API);
    const data=await r.json();

    pages=data
        .filter(f=>f.type==="file")
        .filter(f=>f.name.endsWith(".html"))
        .filter(f=>f.name!=="index.html")
        .map(f=>BASE+encodeURIComponent(f.name));

    console.log(pages);

    if(!pages.length){
        document.body.innerHTML="<h1 style='color:white'>No HTML files</h1>";
        return;
    }

    show();

    setInterval(show,10000);
}

function show(){

    frame.src=pages[i]+"?"+Date.now();

    i=(i+1)%pages.length;
}

init();
</script>

</body>
</html>
