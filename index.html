<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>LIVE</title>

<style>

html,body{
margin:0;
padding:0;
background:white;
font-family:Helvetica, Arial, sans-serif;
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

/* layout */

.wrapper{
width:90vw;
max-width:1200px;
display:grid;
grid-template-columns:1fr 120px;
grid-template-rows:auto auto;
gap:40px;
align-items:center;
}

/* video */

video{
width:100%;
max-width:800px;
aspect-ratio:16/9;
background:black;
}

/* text */

.caption{
font-size:18px;
line-height:1.5;
text-align:left;
}

/* play button */

#playButton{
position:absolute;
width:120px;
height:120px;
border-radius:60px;
background:black;
cursor:pointer;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);opacity:1}
50%{transform:scale(1.08);opacity:.85}
100%{transform:scale(1);opacity:1}
}

/* next link */

.next{
width:120px;
height:120px;
border-radius:60px;
background:black;
animation:pulse 2.5s infinite;
}

.next a{
display:block;
width:100%;
height:100%;
}

</style>
</head>

<body>

<div class="wrapper">

<video id="videoPlayer" playsinline></video>

<div class="next">
<a href="https://fas.indexmod.xyz/"></a>
</div>

<div class="caption">
LIVE STREAM<br>
LOOPING AUDIO<br>
INDEPENDENT SIGNAL<br>
INDEXMOD
</div>

</div>

<div id="playButton"></div>

<audio id="audioPlayer"></audio>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const video=document.getElementById('videoPlayer')
const audio=document.getElementById('audioPlayer')
const playButton=document.getElementById('playButton')

const VIDEO_HLS="/video/video.m3u8"
const AUDIO_HLS="/audio/audio.m3u8"

playButton.onclick=()=>{

playButton.style.display="none"

if(Hls.isSupported()){

const hlsVideo=new Hls()
hlsVideo.loadSource(VIDEO_HLS)
hlsVideo.attachMedia(video)
hlsVideo.on(Hls.Events.MANIFEST_PARSED,()=>video.play())

const hlsAudio=new Hls()
hlsAudio.loadSource(AUDIO_HLS)
hlsAudio.attachMedia(audio)
hlsAudio.on(Hls.Events.MANIFEST_PARSED,()=>audio.play())

}else{

video.src=VIDEO_HLS
audio.src=AUDIO_HLS

video.play()
audio.play()

}

audio.loop=true

}

</script>

</body>
</html>
