<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<!-- Open Graph / Facebook / VK / Telegram -->
<meta property="og:type" content="website">
<meta property="og:title" content="Андрей Дей — Фас">
<meta property="og:description" content="Однодневная выставка графики, скульптуры, инсталляции и видео 15 июля 2026, Москва.">
<meta property="og:image" content="preview.png">
<meta property="og:image:type" content="image/png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Андрей Дей — Фас">
<meta name="twitter:description" content="Однодневная выставка графики, скульптуры, инсталляции и видео 15 июля 2026, Москва.">
<meta name="twitter:image" content="preview.png">

<title>Андрей Дей — Фас</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
    --bg: #000;
    --fg: #fff;
    --border: 1px solid #fff;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family:
      -apple-system,
      BlinkMacSystemFont,
      "SF Pro Display",
      "SF Pro Text",
      system-ui,
      Helvetica,
      Arial,
      sans-serif;
  }

  .poster {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto auto auto auto 1fr;
  }

  .cell {
    border-bottom: var(--border);
    padding: 24px 40px;
    display: flex;
    align-items: center;
  }

  .top {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .top .cell {
    border-right: var(--border);
    justify-content: center;
    font-size: 22px;
    letter-spacing: 0.15em;
  }

  .top .cell:last-child {
    border-right: none;
  }

  .author {
    font-size: clamp(36px, 5vw, 72px);
  }

  /* === БЛОК С ФАС И РЕЗИНОВОЙ ЯЧЕЙКОЙ === */
  .title-row {
    display: grid;
    grid-template-columns: 1fr auto;
    min-height: 30vh;
  }

  .include {
    border-right: var(--border);
    padding: 24px 40px;
    display: flex;
    align-items: center;
  }

  .title {
    justify-content: center;
    font-size: clamp(72px, 12vw, 180px);
    letter-spacing: 0.15em;
  }

  .desc {
    font-size: 22px;
    line-height: 1.6;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 40px;
  }

  .bottom {
    display: grid;
    grid-template-columns: 1fr;
    align-items: center;
  }

  .telegram a {
    color: var(--fg);
    text-decoration: none;
    font-size: 18px;
    letter-spacing: 0.08em;
  }

  .telegram a:hover {
    text-decoration: underline;
  }

  @media (max-width: 900px) {
    .top { grid-template-columns: 1fr; }
    .desc { grid-template-columns: 1fr; }
    .title-row { grid-template-columns: 1fr; }
    .include {
      border-right: none;
      border-bottom: var(--border);
    }
  }
</style>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='8' fill='white'/></svg>">
</head>

<body>

<div class="poster">

  <div class="top">
    <div class="cell">МОСКВА · 15 ИЮЛЯ 2026</div>
    <div class="cell">ОДНОДНЕВНАЯ ВЫСТАВКА</div>
  </div>

  <div class="cell author">Андрей Дей</div>

  <!-- ФАС + include.html -->
  <div class="title-row">
    <div class="include" id="include"></div>
    <div class="cell title">Фас</div>
  </div>

  <div class="cell desc">
    <div>
      графика<br>
      скульптура<br>
      инсталляция<br>
      видео
    </div>
    <div></div>
  </div>

  <div class="cell bottom">
    <div class="telegram">
      <a href="https://t.me/fas_dei" target="_blank">
        Анонсы и приглашения в Телеграме
      </a>
    </div>
  </div>

</div>

<script>
  fetch('include.html')
    .then(r => r.text())
    .then(html => {
      document.getElementById('include').innerHTML = html;
    })
    .catch(() => {
      document.getElementById('include').innerHTML = '';
    });
</script>

</body>
</html>
