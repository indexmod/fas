<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>FAS Player</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}
iframe{
    width:100%;
    height:100%;
    border:0;
}
</style>
</head>
<body>

<iframe id="frame"></iframe>

<script>
const OWNER = "indexmod";
const REPO  = "fas";
const BRANCH = "main";      // если ветка master — поменяй на master

let files = [];
let index = 0;

async function loadFiles(path = "") {

    const url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}?ref=${BRANCH}`;
    const data = await fetch(url).then(r => r.json());

    for (const item of data) {

        if (item.type === "dir") {
            await loadFiles(item.path);          // обходим папки
        }

        if (item.type === "file" && item.name.endsWith(".html")) {
            files.push(`https://${OWNER}.github.io/${REPO}/${item.path}`);
        }
    }
}

function next() {

    if (!files.length) return;

    document.getElementById("frame").src =
        files[index] + "?t=" + Date.now();

    index = (index + 1) % files.length;
}

(async () => {

    await loadFiles();

    // случайный порядок
    files.sort(() => Math.random() - 0.5);

    next();
    setInterval(next, 10000);

})();
</script>

</body>
</html>
