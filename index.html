<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FAS — live stream</title>

<meta name="description" content="Looping audio and video live stream. Independent signal.">

<link rel="canonical" href="https://fas.indexmod.xyz/">

<meta property="og:type" content="website">
<meta property="og:title" content="FAS — looping live stream">
<meta property="og:description" content="Independent looping audio and video stream.">
<meta property="og:url" content="https://fas.indexmod.xyz/">
<meta property="og:image" content="https://fas.indexmod.xyz/preview.png">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="FAS — looping live stream">
<meta name="twitter:description" content="Independent looping audio and video stream.">
<meta name="twitter:image" content="https://fas.indexmod.xyz/preview.png">

<meta name="theme-color" content="#ffffff">

<link rel="preload" href="/audio/audio.m3u8" as="fetch" crossorigin>
<link rel="preload" href="/video/video.m3u8" as="fetch" crossorigin>

<style>

html,body{
margin:0;
padding:0;
background:white;
font-family:Helvetica, Arial, sans-serif;
height:100%;
}

#startScreen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:white;
z-index:10;
transition:opacity 1.5s;
}

#playButton{
width:120px;
height:120px;
border-radius:60px;
background:black;
cursor:pointer;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);opacity:1}
50%{transform:scale(1.08);opacity:.8}
100%{transform:scale(1);opacity:1}
}

.wrapper{
width:90vw;
max-width:900px;
margin:auto;
padding-top:8vh;
opacity:0;
transition:opacity 3s;
}

video{
width:80%;
display:block;
margin:auto;
background:black;
aspect-ratio:16/9;
}

/* timeline */

#timeline{
position:relative;
width:80%;
height:50px;
margin:15px auto 0 auto;
background:#eee;
overflow:hidden;
cursor:pointer;
}

#frames{
display:flex;
height:100%;
}

.frame{
flex:0 0 auto;
height:100%;
}

.frame img{
height:100%;
}

#playhead{
position:absolute;
top:0;
width:2px;
height:100%;
background:red;
pointer-events:none;
}

.bottomRow{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-top:25px;
}

.caption{
font-size:18px;
line-height:1.5;
}

.next{
width:70px;
height:70px;
border-radius:35px;
background:black;
animation:pulse 2.4s infinite;
}

.next a{
display:block;
width:100%;
height:100%;
}

</style>

</head>

<body>

<div id="startScreen">
<div id="playButton"></div>
</div>

<div class="wrapper" id="content">

<video id="videoPlayer" playsinline></video>
<audio id="audioPlayer"></audio>

<div id="timeline">
<div id="frames"></div>
<div id="playhead"></div>
</div>

<div class="bottomRow">

  <div class="caption">
  Работа (без названия, не окончена) из серии «24 Хор».<br>
  Материал — фанера, чёрный и красный маркер.<br>
  Размеры: 120 × 60.<br>
  Автор Андр-о-Дей.<br>
  2026, март.<br><br>
  Музыка: группа «Молчат дома» — «Судно».
  </div>

<div class="next">
<a href="https://fas.indexmod.xyz/"></a>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const video=document.getElementById('videoPlayer')
const audio=document.getElementById('audioPlayer')

const playButton=document.getElementById('playButton')
const startScreen=document.getElementById('startScreen')
const content=document.getElementById('content')

const timeline=document.getElementById('timeline')
const frames=document.getElementById('frames')
const playhead=document.getElementById('playhead')

const VIDEO_HLS="/video/video.m3u8"
const AUDIO_HLS="/audio/audio.m3u8"

let hlsVideo
let hlsAudio

function initVideo(){

if(hlsVideo) hlsVideo.destroy()

hlsVideo=new Hls({
autoStartLoad:true,
maxBufferLength:20
})

hlsVideo.loadSource(VIDEO_HLS)
hlsVideo.attachMedia(video)

hlsVideo.on(Hls.Events.MANIFEST_PARSED,()=>{

video.play()
generateFrames()
updatePlayhead()

})

video.loop=true

}

function initAudio(){

if(hlsAudio) hlsAudio.destroy()

hlsAudio=new Hls()

hlsAudio.loadSource(AUDIO_HLS)
hlsAudio.attachMedia(audio)

hlsAudio.on(Hls.Events.MANIFEST_PARSED,()=>{
audio.play()
})

audio.loop=true

}

function generateFrames(){

const count=40

for(let i=0;i<count;i++){

const canvas=document.createElement("canvas")
canvas.width=160
canvas.height=90

const ctx=canvas.getContext("2d")

const img=document.createElement("img")
img.className="frame"

const t=(video.duration/count)*i

video.currentTime=t

video.onseeked=()=>{

ctx.drawImage(video,0,0,160,90)

img.src=canvas.toDataURL()

frames.appendChild(img)

}

}

video.currentTime=0

}

function updatePlayhead(){

if(video.duration){

const progress=video.currentTime/video.duration
playhead.style.left=(progress*timeline.offsetWidth)+"px"

}

requestAnimationFrame(updatePlayhead)

}

timeline.onclick=(e)=>{

const rect=timeline.getBoundingClientRect()
const x=e.clientX-rect.left
const ratio=x/rect.width

video.pause()
video.currentTime=video.duration*ratio
video.play()

}

playButton.onclick=()=>{

startScreen.style.opacity=0

setTimeout(()=>{
startScreen.style.display="none"
content.style.opacity=1
},1200)

if(Hls.isSupported()){

initVideo()
initAudio()

}else{

video.src=VIDEO_HLS
audio.src=AUDIO_HLS

video.play()
audio.play()

}

}

</script>

</body>
</html>
