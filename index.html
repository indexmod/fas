<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ФАС</title>

<link rel="icon" type="image/svg+xml"
href='data:image/svg+xml,
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<rect width="100" height="100" fill="white"/>
<circle cx="50" cy="50" r="40" fill="black"/>
</svg>'>

<style>

html,body{
margin:0;
padding:0;
height:100%;
background:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:Helvetica, Arial, sans-serif;
}

/* VIDEO */

video{
width:30vw;
max-width:600px;
aspect-ratio:16/9;
background:black;
}

/* CREDITS */

.credits{
width:30vw;
max-width:600px;
margin-top:15px;
font-size:14px;
line-height:1.5;
text-align:left;
}

/* LINK BUTTON */

.linkButton{
width:80px;
height:80px;
border-radius:50%;
margin-top:25px;
background:linear-gradient(135deg, red 50%, black 50%);
cursor:pointer;
display:block;
}

/* START SCREEN */

#startScreen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:white;
z-index:10;
transition:opacity 1s;
}

#playButton{
width:120px;
height:120px;
border-radius:60px;
background:black;
cursor:pointer;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<div id="startScreen">
<div id="playButton"></div>
</div>

<video id="videoPlayer" playsinline autoplay loop></video>
<audio id="audioPlayer" loop></audio>

<div class="credits">

Работа (без названия, не окончена) из серии «24 Хор».<br>
Материал — фанера, чёрный и красный маркер.<br>
Размеры: 120 × 60.<br>
Автор Андр-о-Дей.<br>
2026, март.<br><br>

Музыка: Molchat Doma — “Sudno (Boris Ryzhy)”.

</div>

<a href="https://fas.indexmod.xyz/" class="linkButton"></a>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const video=document.getElementById("videoPlayer")
const audio=document.getElementById("audioPlayer")
const startScreen=document.getElementById("startScreen")
const playButton=document.getElementById("playButton")

const VIDEO_SRC="/video/video.m3u8"
const AUDIO_SRC="/audio/audio.m3u8"

function initVideo(){

if(Hls.isSupported()){

const hlsVideo=new Hls()
hlsVideo.loadSource(VIDEO_SRC)
hlsVideo.attachMedia(video)

}else{

video.src=VIDEO_SRC

}

video.loop=true
video.play()

}

function initAudio(){

if(Hls.isSupported()){

const hlsAudio=new Hls()
hlsAudio.loadSource(AUDIO_SRC)
hlsAudio.attachMedia(audio)

}else{

audio.src=AUDIO_SRC

}

audio.loop=true
audio.play()

}

playButton.onclick=()=>{

startScreen.style.opacity=0

setTimeout(()=>{
startScreen.style.display="none"
},1000)

initVideo()
initAudio()

}

</script>

</body>
</html>
