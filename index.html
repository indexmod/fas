<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>LIVE</title>

<style>

html,body{
margin:0;
padding:0;
background:white;
font-family:Helvetica, Arial, sans-serif;
height:100%;
}

/* стартовый экран */

#startScreen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:white;
z-index:10;
transition:opacity 1.5s;
}

/* кнопка пуск */

#playButton{
width:120px;
height:120px;
border-radius:60px;
background:black;
cursor:pointer;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);opacity:1}
50%{transform:scale(1.08);opacity:.8}
100%{transform:scale(1);opacity:1}
}

/* основной блок */

.wrapper{
width:90vw;
max-width:900px;
margin:auto;
padding-top:8vh;
opacity:0;
transition:opacity 3s;
}

/* видео */

video{
width:100%;
background:black;
aspect-ratio:16/9;
}

/* нижний ряд */

.bottomRow{
display:flex;
justify-content:space-between;
align-items:flex-start;
margin-top:25px;
}

/* текст */

.caption{
font-size:18px;
line-height:1.5;
text-align:left;
}

/* ссылка круг */

.next{
width:70px;
height:70px;
border-radius:35px;
background:black;
animation:pulse 2.4s infinite;
}

.next a{
display:block;
width:100%;
height:100%;
}

</style>
</head>

<body>

<div id="startScreen">
<div id="playButton"></div>
</div>

<div class="wrapper" id="content">

<video id="videoPlayer" playsinline></video>

<div class="bottomRow">

<div class="caption">
LIVE STREAM<br>
LOOPING AUDIO<br>
INDEPENDENT SIGNAL<br>
INDEXMOD
</div>

<div class="next">
<a href="https://fas.indexmod.xyz/"></a>
</div>

</div>

</div>

<audio id="audioPlayer"></audio>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const video=document.getElementById('videoPlayer')
const audio=document.getElementById('audioPlayer')
const playButton=document.getElementById('playButton')
const startScreen=document.getElementById('startScreen')
const content=document.getElementById('content')

const VIDEO_HLS="/video/video.m3u8"
const AUDIO_HLS="/audio/audio.m3u8"

playButton.onclick=()=>{

startScreen.style.opacity=0

setTimeout(()=>{
startScreen.style.display="none"
content.style.opacity=1
},1200)

if(Hls.isSupported()){

const hlsVideo=new Hls()
hlsVideo.loadSource(VIDEO_HLS)
hlsVideo.attachMedia(video)
hlsVideo.on(Hls.Events.MANIFEST_PARSED,()=>video.play())

const hlsAudio=new Hls()
hlsAudio.loadSource(AUDIO_HLS)
hlsAudio.attachMedia(audio)
hlsAudio.on(Hls.Events.MANIFEST_PARSED,()=>audio.play())

}else{

video.src=VIDEO_HLS
audio.src=AUDIO_HLS

video.play()
audio.play()

}

audio.loop=true

}

</script>

</body>
</html>
