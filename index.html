<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FAS — live stream</title>

<meta name="description" content="Looping audio and video live stream. Independent signal.">
<link rel="icon" type="image/svg+xml"
href='data:image/svg+xml,
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
<rect width="100" height="100" fill="white"/>
<circle cx="50" cy="50" r="40" fill="black"/>
</svg>'>

<link rel="preload" href="/audio/audio.m3u8" as="fetch" crossorigin>
<link rel="preload" href="/video/video.m3u8" as="fetch" crossorigin>

<style>

html,body{
margin:0;
padding:0;
background:white;
font-family:Helvetica, Arial, sans-serif;
height:100%;
}

/* старт */

#startScreen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
background:white;
z-index:10;
transition:opacity 1.5s;
}

#playButton{
width:120px;
height:120px;
border-radius:60px;
background:black;
cursor:pointer;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}

/* layout */

.wrapper{
width:90vw;
max-width:900px;
margin:auto;
padding-top:8vh;
opacity:0;
transition:opacity 3s;
}

video{
width:80%;
display:block;
margin:auto;
background:black;
aspect-ratio:16/9;
}

/* timeline */

#timeline{
position:relative;
width:80%;
height:50px;
margin:15px auto 0 auto;
background:#eee;
overflow:hidden;
cursor:pointer;
}

#frames{
display:flex;
height:100%;
}

.thumb{
width:60px;
height:100%;
object-fit:cover;
}

#playhead{
position:absolute;
top:0;
width:2px;
height:100%;
background:red;
pointer-events:none;
}

/* bottom */

.bottomRow{
width:80%;
margin:20px auto 0 auto;
display:flex;
justify-content:space-between;
align-items:flex-start;
}

.caption{
width:50%;
font-size:14px;
line-height:1.5;
}

.next{
width:70px;
height:70px;
border-radius:35px;
background:black;
animation:pulse 2.4s infinite;
}

.next a{
display:block;
width:100%;
height:100%;
}

</style>

</head>

<body>

<div id="startScreen">
<div id="playButton"></div>
</div>

<div class="wrapper" id="content">

<video id="videoPlayer" playsinline></video>
<audio id="audioPlayer"></audio>

<div id="timeline">
<div id="frames"></div>
<div id="playhead"></div>
</div>

<div class="bottomRow">

<div class="caption">

Работа (без названия, не окончена) из серии «24 Хор».<br>
Материал — фанера, чёрный и красный маркер.<br>
Размеры: 120 × 60.<br>
Автор Андр-о-Дей.<br>
2026, март.<br><br>

Музыка: Molchat Doma — “Sudno (Boris Ryzhy)”.

</div>

<div class="next">
<a href="https://fas.indexmod.xyz/"></a>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script>

const video=document.getElementById('videoPlayer')
const audio=document.getElementById('audioPlayer')

const playButton=document.getElementById('playButton')
const startScreen=document.getElementById('startScreen')
const content=document.getElementById('content')

const timeline=document.getElementById('timeline')
const frames=document.getElementById('frames')
const playhead=document.getElementById('playhead')

const VIDEO_HLS="/video/video.m3u8"
const AUDIO_HLS="/audio/audio.m3u8"

let hlsVideo
let hlsAudio

/* video */

function initVideo(){

if(hlsVideo) hlsVideo.destroy()

hlsVideo=new Hls()

hlsVideo.loadSource(VIDEO_HLS)
hlsVideo.attachMedia(video)

hlsVideo.on(Hls.Events.MANIFEST_PARSED,()=>{

video.play()

video.addEventListener("loadedmetadata",()=>{
updatePlayhead()
generateThumbnails()
})

})

video.loop=true

}

/* audio */

function initAudio(){

if(hlsAudio) hlsAudio.destroy()

hlsAudio=new Hls()

hlsAudio.loadSource(AUDIO_HLS)
hlsAudio.attachMedia(audio)

hlsAudio.on(Hls.Events.MANIFEST_PARSED,()=>{
audio.play()
})

audio.loop=true

}

/* playhead */

function updatePlayhead(){

if(video.duration){

const progress=video.currentTime/video.duration
playhead.style.left=(progress*100)+"%"

}

requestAnimationFrame(updatePlayhead)

}

/* click timeline */

timeline.onclick=(e)=>{

const rect=timeline.getBoundingClientRect()
const x=e.clientX-rect.left
const ratio=x/rect.width

video.currentTime=video.duration*ratio

}

/* thumbnails */

function generateThumbnails(){

const count=20
const canvas=document.createElement("canvas")
const ctx=canvas.getContext("2d")

canvas.width=160
canvas.height=90

let i=0

function capture(){

if(i>=count){
video.currentTime=0
return
}

const t=(video.duration/count)*i
video.currentTime=t

video.onseeked=()=>{

ctx.drawImage(video,0,0,160,90)

const img=document.createElement("img")
img.className="thumb"
img.src=canvas.toDataURL()

frames.appendChild(img)

i++
capture()

}

}

capture()

}

/* start */

playButton.onclick=()=>{

startScreen.style.opacity=0

setTimeout(()=>{
startScreen.style.display="none"
content.style.opacity=1
},1200)

if(Hls.isSupported()){

initVideo()
initAudio()

}else{

video.src=VIDEO_HLS
audio.src=AUDIO_HLS

video.play()
audio.play()

}

}

</script>

</body>
</html>
