<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Маски по сетке (исправлено)</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
    }
    #startBtn {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      z-index: 9999;
    }
    img {
      position: absolute;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <button id="startBtn">▶ Старт</button>

  <script>
    const maskSize = 50;          // размер PNG
    const cellSize = maskSize + 2; // шаг сетки (зазор 2px)
    let maskCount = 0;
    let audioCtx = null;

    // --- Маска ---
    function createMask(size) {
      const faceR = 45; // круг чуть больше, ближе к краям

      // глаза ближе к центру
      const eyeBaseY = 40 + Math.random() * 4;
      const eyeBaseX = 38 + Math.random() * 2;
      const eyeGap = 20 + Math.random() * 4;

      const eyeR = 3 + Math.random() * 4; // уменьшены

      // рот ниже центра, но компактный
      const mouthY = 60 + Math.random() * 4;
      const mouthR = 5 + Math.random() * 6; // меньше

      return `
        <svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="${faceR}" fill="#ffffff"/>
          <circle cx="${eyeBaseX}" cy="${eyeBaseY}" r="${eyeR.toFixed(1)}" fill="#000000"/>
          <circle cx="${eyeBaseX + eyeGap}" cy="${eyeBaseY}" r="${eyeR.toFixed(1)}" fill="#000000"/>
          <circle cx="50" cy="${mouthY}" r="${mouthR.toFixed(1)}" fill="#000000"/>
        </svg>
      `;
    }

    // --- SVG → PNG (с прозрачным фоном) ---
    function svgToPng(svgStr, size, callback) {
      const img = new Image();
      const svgBlob = new Blob([svgStr], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(svgBlob);

      img.onload = () => {
        const canvas = document.createElement("canvas");
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, size, size);
        ctx.drawImage(img, 0, 0, size, size);

        const pngUrl = canvas.toDataURL("image/png");
        URL.revokeObjectURL(url);
        callback(pngUrl);
      };
      img.src = url;
    }

    // --- Звук ---
    function playTone(progress) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();

      const minFreq = 100;
      const maxFreq = 1200;
      const freq = minFreq + progress * (maxFreq - minFreq);

      osc.frequency.value = freq;
      osc.type = "sine";

      gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(
        0.001,
        audioCtx.currentTime + 0.25
      );

      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);

      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);
    }

    // --- Координаты спирали (по клеткам) ---
    function spiralCoords(n) {
      let x = 0, y = 0;
      let dx = 1, dy = 0;
      let step = 1, stepsTaken = 0, turn = 0;
      for (let i = 0; i < n; i++) {
        if (stepsTaken === step) {
          stepsTaken = 0;
          turn++;
          [dx, dy] = [-dy, dx]; // поворот по часовой стрелке
          if (turn % 2 === 0) step++;
        }
        x += dx;
        y += dy;
        stepsTaken++;
      }
      return {x, y};
    }

    // --- Проверка выхода за экран ---
    function isOutOfBounds(px, py) {
      return (
        px - maskSize / 2 < 0 ||
        py - maskSize / 2 < 0 ||
        px + maskSize / 2 > window.innerWidth ||
        py + maskSize / 2 > window.innerHeight
      );
    }

    // --- Добавление маски ---
    function addMask() {
      const {x, y} = spiralCoords(maskCount);
      const centerX = Math.floor(window.innerWidth / 2);
      const centerY = Math.floor(window.innerHeight / 2);
      const px = centerX + x * cellSize;
      const py = centerY + y * cellSize;

      if (isOutOfBounds(px, py)) {
        // очищаем и начинаем заново
        document.querySelectorAll("img").forEach(el => el.remove());
        maskCount = 0;
        return;
      }

      const svg = createMask(maskSize);
      svgToPng(svg, maskSize, (pngUrl) => {
        const img = document.createElement("img");
        img.src = pngUrl;
        img.width = maskSize;
        img.height = maskSize;
        img.style.left = px + "px";
        img.style.top = py + "px";
        document.body.appendChild(img);
      });

      const progress = (maskCount % 100) / 100;
      playTone(progress);

      maskCount++;
    }

    // --- Запуск ---
    document.getElementById("startBtn").addEventListener("click", async () => {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        await audioCtx.resume();
      }
      document.getElementById("startBtn").style.display = "none";

      setInterval(() => {
        addMask();
      }, 150);
    });
  </script>
  <!-- 🔽 Вставляем этот блок в любое место страницы -->
<section>
  <style>
    /* Контейнер */
    .fav-floating {
      position: fixed;
      bottom: 20px;

      width: 60px;
      height: 60px;
      background: black;

      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      z-index: 9999;
      cursor: pointer;
    }

    /* Внутренний фавикон (иконка + точки) */
    .fav-floating .fav-icon {
      width: 60px;
      height: 60px;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .fav-floating .fav-icon svg {
      width: 40px;
      height: 40px;
    }

    /* Расширение контейнера */
    .fav-floating:hover {
      width: 180px;
      border-radius: 40px;
    }

    /* Ссылка-стрелка */
    .fav-floating a {
      margin-left: auto;
      margin-right: 20px;
      color: white;
      text-decoration: none;
      font-size: 26px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    /* Появление стрелки */
    .fav-floating:hover a {
      opacity: 1;
    }
  </style>

  <div class="fav-floating">
    <div class="fav-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" fill="black"/>
        <circle cx="35" cy="35" r="5" fill="white"/>
        <circle cx="65" cy="35" r="5" fill="white"/>
        <circle cx="50" cy="65" r="5" fill="white"/>
      </svg>
    </div>
    <!-- ✏️ Редактируйте ссылку здесь -->
    <a href="https://indexmod.github.io/chorus/sphere-tone-by-andr-o-dei.html" target="_blank" title="S P H E R E">&#10140;</a>
  </div>
</section>
<!-- 🔼 Конец блока -->
</body>
</html>
