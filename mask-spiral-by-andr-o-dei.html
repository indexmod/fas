<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Маски по сетке</title>

<style>
body{
    margin:0;
    padding:0;
    background:#000;
    overflow:hidden;
}

img{
    position:absolute;
    transform:translate(-50%,-50%);
    pointer-events:none;
}
</style>

</head>

<body>

<script>

const maskSize = 50;
const cellSize = maskSize + 2;

let maskCount = 0;
let audioCtx = null;
let started = false;

function createMask(size){

    const faceR = 45;

    const eyeBaseY = 40 + Math.random()*4;
    const eyeBaseX = 38 + Math.random()*2;
    const eyeGap = 20 + Math.random()*4;

    const eyeR = 3 + Math.random()*4;

    const mouthY = 60 + Math.random()*4;
    const mouthR = 5 + Math.random()*6;

    return `
<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 100 100">
<circle cx="50" cy="50" r="${faceR}" fill="#fff"/>
<circle cx="${eyeBaseX}" cy="${eyeBaseY}" r="${eyeR.toFixed(1)}" fill="#000"/>
<circle cx="${eyeBaseX+eyeGap}" cy="${eyeBaseY}" r="${eyeR.toFixed(1)}" fill="#000"/>
<circle cx="50" cy="${mouthY}" r="${mouthR.toFixed(1)}" fill="#000"/>
</svg>`;
}

function svgToPng(svgStr,size,callback){

    const img = new Image();

    const svgBlob = new Blob(
        [svgStr],
        {type:"image/svg+xml;charset=utf-8"}
    );

    const url = URL.createObjectURL(svgBlob);

    img.onload = ()=>{

        const canvas = document.createElement("canvas");

        canvas.width = size;
        canvas.height = size;

        const ctx = canvas.getContext("2d");

        ctx.clearRect(0,0,size,size);
        ctx.drawImage(img,0,0,size,size);

        callback(canvas.toDataURL("image/png"));

        URL.revokeObjectURL(url);

    };

    img.src = url;

}

function playTone(progress){

    if(!audioCtx) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    const minFreq = 100;
    const maxFreq = 1200;

    osc.frequency.value =
        minFreq + progress*(maxFreq-minFreq);

    osc.type = "sine";

    gain.gain.setValueAtTime(
        0.15,
        audioCtx.currentTime
    );

    gain.gain.exponentialRampToValueAtTime(
        0.001,
        audioCtx.currentTime+0.25
    );

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime+0.25);

}
function spiralCoords(n){

    let x = 0;
    let y = 0;

    let dx = 1;
    let dy = 0;

    let step = 1;
    let stepsTaken = 0;
    let turn = 0;

    for(let i=0;i<n;i++){

        if(stepsTaken===step){

            stepsTaken=0;
            turn++;

            [dx,dy]=[-dy,dx];

            if(turn%2===0)
                step++;

        }

        x+=dx;
        y+=dy;
        stepsTaken++;

    }

    return {x,y};

}

function isOutOfBounds(px,py){

    return(

        px-maskSize/2<0 ||
        py-maskSize/2<0 ||

        px+maskSize/2>window.innerWidth ||
        py+maskSize/2>window.innerHeight

    );

}

function addMask(){

    const {x,y}=spiralCoords(maskCount);

    const centerX=Math.floor(window.innerWidth/2);
    const centerY=Math.floor(window.innerHeight/2);

    const px=centerX+x*cellSize;
    const py=centerY+y*cellSize;

    if(isOutOfBounds(px,py)){

        document
            .querySelectorAll("img")
            .forEach(img=>img.remove());

        maskCount=0;
        return;

    }

    const svg=createMask(maskSize);

    svgToPng(svg,maskSize,(png)=>{

        const img=document.createElement("img");

        img.src=png;
        img.width=maskSize;
        img.height=maskSize;

        img.style.left=px+"px";
        img.style.top=py+"px";

        document.body.appendChild(img);

    });

    playTone((maskCount%100)/100);

    maskCount++;

}

async function startArtwork(){

    if(started)
        return;

    started=true;

    if(!audioCtx){

        audioCtx=new(
            window.AudioContext||
            window.webkitAudioContext
        )();

        try{

            await audioCtx.resume();

        }catch(e){}

    }

    setInterval(addMask,150);

}

window.addEventListener("message", (e) => {

    if (e.data === "START") {
        startArtwork();
    }

});

</script>

</body>
</html>
